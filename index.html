<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Canine Learning Tools</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.min.css">
</head>
<body>

<header>
  <h1>Canine Learning Tools</h1>
  <p>Where knowledge meets wagging tails.</p>
</header>

<div class="container">

  <!-- Training Guides -->
  <section>
    <h2><i class="fa-solid fa-book-open"></i> Training Guides</h2>
    <div class="grid" id="training-guides"></div>
  </section>

  <section>
    <h2><i class="fa-solid fa-bone"></i> Recommended Products</h2>
    <div class="scroll-grid" id="products"></div>
  </section>

  <section>
    <h2><i class="fa-solid fa-video"></i> Training Videos</h2>
    <div class="video-grid" id="videos"></div>
  </section>

  <section>
    <h2><i class="fa-solid fa-kit-medical"></i> Health & Safety</h2>
    <div class="grid" id="health-safety"></div>
  </section>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" id="modal-close">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.obf.js"></script>
</body>
</html>
